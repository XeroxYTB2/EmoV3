name: Deploy Frontend → HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push frontend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Change these to your HuggingFace username and Space name:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          SPACE_NAME: emo-ai
        run: |
          git config --global user.email "emo-deploy@github.com"
          git config --global user.name "Émo Deploy Bot"

          # Clone the HF Space repo
          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$SPACE_NAME hf-space

          # Copy frontend files
          cp frontend/index.html hf-space/index.html
          cp frontend/README.md  hf-space/README.md

          # Commit and push
          cd hf-space
          git add -A
          git diff --cached --quiet || git commit -m "🌸 Deploy from GitHub Actions"
          git push
