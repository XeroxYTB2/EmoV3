<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emo · ton acolyte sarcastique</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0f0f">
</head>
<body>
  <div class="app">
    <!-- Barre latérale -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn">+ Nouvelle discussion</button>
      </div>
      <div class="chat-history" id="chatHistory"></div>
      <div class="sidebar-footer">
        <div class="model-config">
          <label>URL Ollama</label>
          <input type="text" id="ollamaUrl" placeholder="https://ton-serveur-ollama.com" value="">
        </div>
        <div class="model-config">
          <label>Modèle</label>
          <input type="text" id="modelName" placeholder="llama3.2:3b" value="hf.co/bartowski/Qwen2.5-Coder-7B-Instruct-abliterated-GGUF:Q8_0">
        </div>
        <div class="model-config">
          <label>
            <input type="checkbox" id="thinkingToggle" checked> Mode réflexion
          </label>
        </div>
        <div class="model-config">
          <label>
            <input type="checkbox" id="useCorsProxy"> Utiliser un proxy CORS
          </label>
        </div>
        <div class="model-config">
          <label>URL du proxy CORS</label>
          <input type="text" id="proxyUrl" placeholder="https://ton-worker.workers.dev" value="">
        </div>
        <button class="save-config-btn" id="saveConfigBtn">Enregistrer</button>
        <div class="status" id="connectionStatus">⚪ Déconnecté</div>
      </div>
    </aside>

    <!-- Zone de chat principale -->
    <main class="chat-container">
      <header class="chat-header">
        <button class="menu-toggle" id="menuToggle">☰</button>
        <h1>Emo <span class="emoji">😏</span></h1>
        <div class="header-actions">
          <button class="icon-btn" id="clearChatBtn" title="Effacer la discussion">🗑️</button>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="welcome-message">
          <div class="welcome-avatar">😏</div>
          <h2>Hey. Moi c'est Emo.</h2>
          <p>Ton acolyte légèrement sarcastique et bien trop intelligent.<br>Pose-moi ce que tu veux. Je lèverai sans doute les yeux au ciel avant de répondre.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Écris à Emo..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" disabled>➤</button>
        </div>
        <div class="input-footer">
          <span class="char-count"><span id="charCount">0</span>/4000</span>
          <span class="hint">Emo réfléchit… ou pas.</span>
        </div>
      </div>
    </main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
  <script src="script.js" type="module"></script>
</body>
</html>
